<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Velha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="menu" class="screen">
    <h1 class="title">Jogo da Velha</h1>
    <div class="menu-buttons">
      <button id="btn-pvp" class="btn">Dois Jogadores</button>
      <button id="btn-pvc" class="btn">Contra o Computador</button>
    </div>
  </div>

  <div id="game" class="screen hidden">
    <div id="status" class="status">Vez do X</div>
    <div id="grid" class="grid">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>
    <div class="scoreboard">
      <div><span class="score-x">X</span>: <span id="score-x">0</span></div>
      <div>Empates: <span id="score-draws">0</span></div>
      <div><span class="score-o">O</span>: <span id="score-o">0</span></div>
    </div>
    <div class="game-buttons">
      <button id="btn-restart" class="btn">Reiniciar</button>
      <button id="btn-menu" class="btn">Menu</button>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
